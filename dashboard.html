<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SourceMint — Supplier dashboard</title>
<link rel="stylesheet" href="portal.css">
</head>
<body>
<nav class="nav">
  <a class="logo" href="index.html">◧</a>
  <a href="index.html">SourceMint</a>
  <span class="sp"></span>
  <span id="who" class="muted"></span>
  <a href="#" onclick="logout();return false">Sign out</a>
</nav>
<div class="wrap" style="max-width:820px">
  <h1>Your dashboard</h1>
  <p class="sub">Add products buyers can discover, and see inquiries as they arrive.</p>

  <div class="card">
    <h2 style="margin-top:0">Add a product</h2>
    <form id="pf">
      <label>Product title *</label>
      <input name="title" required placeholder="e.g. Bamboo Drawer Organizer">
      <label>Description</label>
      <textarea name="description" placeholder="Materials, sizes, customization, certifications…"></textarea>
      <div class="row">
        <div><label>Category</label>
          <select name="category">
            <option>home</option><option>kitchen</option><option>beauty</option><option>electronics</option>
            <option>fitness</option><option>pets</option><option>baby</option><option>outdoor</option>
            <option>office</option><option>fashion</option><option>tools</option><option>toys</option>
          </select></div>
        <div><label>MOQ</label><input name="moq" type="number" value="100"></div>
      </div>
      <div class="row">
        <div><label>Unit cost (USD) *</label><input name="unitCostUSD" type="number" step="0.01" required placeholder="3.10"></div>
        <div><label>Shipping/unit (USD)</label><input name="shippingPerUnitUSD" type="number" step="0.01" placeholder="1.20"></div>
      </div>
      <div class="row">
        <div><label>Amazon retail (USD)</label><input name="amazonPriceUSD" type="number" step="0.01" placeholder="24.99"></div>
        <div><label>Weight (kg)</label><input name="weightKg" type="number" step="0.01" placeholder="0.55"></div>
      </div>
      <label>Product photo (optional)</label>
      <input name="image" type="file" accept="image/*">
      <button type="submit">Publish product</button>
      <div id="pm" class="msg"></div>
    </form>
  </div>

  <h2>Your products</h2>
  <div id="products" class="grid"><p class="muted">Loading…</p></div>

  <h2 style="margin-top:34px">Buyer inquiries</h2>
  <div id="inquiries"><p class="muted">Loading…</p></div>
</div>
<script src="app.js"></script>
<script>
requireLogin();

async function loadMe(){ try { const c = await api("/companies/me",{auth:true}); document.getElementById("who").textContent=c.name; } catch(e){ if(e.status===401) logout(); } }
async function loadProducts(){
  const el=document.getElementById("products");
  try {
    const ps = await api("/products/mine/list",{auth:true});
    el.innerHTML = ps.length ? ps.map(p=>`<div class="item"><span class="pill">${p.category}</span>
      <h3>${p.titleText}</h3><div class="m">Cost $${p.unitCostUSD} · Amazon $${p.amazonPriceUSD} · MOQ ${p.moq}${p.images.length?" · 📷":""}</div></div>`).join("")
      : '<p class="muted">No products yet — add your first above.</p>';
  } catch(e){ el.innerHTML='<p class="muted">Could not load.</p>'; }
}
async function loadInquiries(){
  const el=document.getElementById("inquiries");
  try {
    const xs = await api("/inquiries/mine",{auth:true});
    el.innerHTML = xs.length ? xs.map(i=>`<div class="item"><h3>${i.buyerEmail} · qty ${i.quantity}</h3>
      <div class="m">${i.productTitle?("Re: "+i.productTitle+" · "):""}${i.message}</div></div>`).join("")
      : '<p class="muted">No inquiries yet. They\'ll appear here when buyers reach out.</p>';
  } catch(e){ el.innerHTML='<p class="muted">Could not load.</p>'; }
}

document.getElementById("pf").addEventListener("submit", async (e)=>{
  e.preventDefault();
  const form=e.target, fd=Object.fromEntries(new FormData(form).entries());
  const file=form.image.files[0];
  ["moq"].forEach(k=>fd[k]=parseInt(fd[k]||"0"));
  ["unitCostUSD","shippingPerUnitUSD","amazonPriceUSD","weightKg"].forEach(k=>fd[k]=parseFloat(fd[k]||"0"));
  delete fd.image;
  try {
    const p = await api("/products",{method:"POST",auth:true,body:fd});
    if (file) {
      const f=new FormData(); f.append("image",file);
      await api(`/products/${p.id}/images`,{method:"POST",auth:true,form:true,body:f});
    }
    msg(document.getElementById("pm"),"Product published ✓",true);
    form.reset(); loadProducts();
  } catch(err){ msg(document.getElementById("pm"),(err.data&&err.data.error)||"Could not publish.",false); }
});

loadMe(); loadProducts(); loadInquiries();
</script>
</body>
</html>
