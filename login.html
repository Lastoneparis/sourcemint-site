<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SourceMint — Supplier login</title>
<link rel="stylesheet" href="portal.css">
</head>
<body>
<nav class="nav">
  <a class="logo" href="index.html">◧</a>
  <a href="index.html">SourceMint</a>
  <span class="sp"></span>
  <a href="register.html">Register</a>
</nav>
<div class="wrap">
  <h1>Supplier login</h1>
  <p class="sub">Manage your products and buyer inquiries.</p>
  <div class="card">
    <form id="f">
      <label>Email</label>
      <input name="email" type="email" required>
      <label>Password</label>
      <input name="password" type="password" required>
      <button type="submit">Sign in</button>
      <div id="m" class="msg"></div>
    </form>
    <p class="muted" style="margin-top:14px">New here? <a class="link" href="register.html">Create a supplier account</a></p>
  </div>
</div>
<script src="app.js"></script>
<script>
if (token()) location.href = "dashboard.html";
document.getElementById("f").addEventListener("submit", async (e) => {
  e.preventDefault();
  const fd = Object.fromEntries(new FormData(e.target).entries());
  try {
    const r = await api("/companies/login", { method:"POST", body: fd });
    setToken(r.token);
    location.href = "dashboard.html";
  } catch (err) {
    msg(document.getElementById("m"), "Incorrect email or password.", false);
  }
});
</script>
</body>
</html>
